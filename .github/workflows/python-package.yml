name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest -q src/flash_mlm/host/test_host_utils.py

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set package version from tag
        if: github.ref_type == 'tag'
        run: |
          python - <<'PY'
          import pathlib

          pyproject = pathlib.Path("pyproject.toml")
          lines = pyproject.read_text().splitlines()
          tag = "${{ github.ref_name }}"
          version = tag[1:] if tag.startswith("v") else tag

          in_project = False
          replaced = False
          for i, line in enumerate(lines):
              stripped = line.strip()
              if stripped.startswith("[") and stripped.endswith("]"):
                  in_project = stripped == "[project]"
                  continue
              if in_project and stripped.startswith("version") and "=" in stripped:
                  lines[i] = f'version = "{version}"'
                  replaced = True
                  break

          if not replaced:
              raise SystemExit("Could not find [project] version line in pyproject.toml")

          pyproject.write_text("\n".join(lines) + "\n")
          print(f"Set pyproject version to {version}")
          PY

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
